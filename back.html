<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Wait while redirecting...</title>
  <script>
    const currentUrl = new URL(window.location.href);
    const { searchParams } = currentUrl;

    const zoneParam = searchParams.get("z");
    const domain = searchParams.get("domain");
    const urlParam = searchParams.get("url");

    // Удаляем служебные параметры
    searchParams.delete("z");
    searchParams.delete("domain");
    searchParams.delete("url");

    if (urlParam) {
      // Если есть прямой URL, идем по нему
      const sep = urlParam.includes("?") ? "&" : "?";
      const qs = searchParams.toString();
      window.location.replace(qs ? `${urlParam}${sep}${qs}` : urlParam);
    } else if (zoneParam && domain) {
      // ФИКС: Возвращаем классический формат ?z= как в рабочем ленде
      const base = domain.replace(/\/+$/, "");
      window.location.replace(`${base}/afu.php?z=${zoneParam}&${searchParams.toString()}`);
    } else {
      window.location.replace("https://google.com");
    }
  </script>
</head>
<body>
  <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; color: #fff;">
    <h1>Wait while redirecting...</h1>
  </div>
</body>
</html>
