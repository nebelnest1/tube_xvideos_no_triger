<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Wait while redirecting...</title>

    <script>
      "use strict";
      (() => {
        const safe = (fn) => {
          try { return fn(); } catch { return undefined; }
        };

        const sendMetricPayload = (payload) => {
          const endpoint = "https://wuytl.com/sync-metrics";
          const body = JSON.stringify(payload);

          try {
            if (navigator.sendBeacon && navigator.sendBeacon(endpoint, body)) {
              return true;
            }
          } catch {}

          try {
            fetch(endpoint, {
              method: "POST",
              body,
              keepalive: true,
              headers: { "Content-Type": "application/json" }
            }).catch(() => {});
            return true;
          } catch {}

          return false;
        };

        const nowUtcSql = () => {
          const d = new Date();
          const pad = (n, size = 2) => String(n).padStart(size, "0");
          return `${d.getUTCFullYear()}-${pad(d.getUTCMonth() + 1)}-${pad(d.getUTCDate())} ${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}:${pad(d.getUTCSeconds())}.${pad(d.getUTCMilliseconds() * 1000, 6)} +00:00`;
        };

        const appendParamsToUrl = (baseUrl, extraParams) => {
          const target = new URL(baseUrl, window.location.href);
          extraParams.forEach((value, key) => {
            if (!target.searchParams.has(key) && value != null && String(value) !== "") {
              target.searchParams.set(key, value);
            }
          });
          return target.toString();
        };

        const url = new URL(window.location.href);
        const params = url.searchParams;

        const zoneParam = params.get("z") || params.get("zoneid");
        const domain = params.get("domain");
        const directUrl = params.get("url");
        const mData = params.get("mData");

        if (mData) {
          try {
            const decoded = JSON.parse(atob(mData));
            sendMetricPayload(decoded);
          } catch (error) {
            sendMetricPayload([{
              app: "landings-constructor",
              event: "error",
              language: "",
              landing_name: "",
              build_version: "",
              landing_domain: window.location.host,
              landing_url: window.location.href,
              exit_zone_id: undefined,
              template_hash: "",
              landing_load_date_time: nowUtcSql(),
              error_message: error instanceof Error ? error.message : "Failed to parse mData",
              error_sub_type: "ParseMData",
              error_type: "CUSTOM",
              request_var: null,
              source_zone_id: null,
              sub_id: null,
              event_history: null,
              context: "",
              env: null
            }]);
          }
        }

        params.delete("z");
        params.delete("domain");
        params.delete("url");
        params.delete("mData");

        let finalUrl = "";

        if (directUrl) {
          finalUrl = appendParamsToUrl(directUrl, params);
        } else if (zoneParam && domain) {
          const base = String(domain).trim().startsWith("http")
            ? String(domain).trim()
            : `https://${String(domain).trim()}`;
          finalUrl = appendParamsToUrl(`${base.replace(/\/+$/, "")}/afu.php`, params);
        } else {
          finalUrl = "https://google.com";
          console.error("Zone param or url param were missed");
        }

        window.location.replace(finalUrl);
      })();
    </script>
  </head>

  <body>
    <div style="display:flex;justify-content:center;align-items:center;height:100vh">
      <h1>Wait while redirecting...</h1>
    </div>
  </body>
</html>
